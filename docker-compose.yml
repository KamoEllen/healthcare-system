version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: healthcare_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: healthcare_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/healthcare_db
      JWT_SECRET: dev_jwt_secret_min_32_characters_long
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      EMAIL_PROVIDER: mailtrap
      EMAIL_USER: ''
      EMAIL_PASS: ''
      EMAIL_FROM: noreply@healthcare.dev
      CORS_ORIGIN: http://localhost:4200
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src

  frontend:
    image: node:20-alpine
    container_name: healthcare_frontend
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    ports:
      - '4200:4200'
    volumes:
      - ./client:/app
    depends_on:
      - api

volumes:
  postgres_data:
