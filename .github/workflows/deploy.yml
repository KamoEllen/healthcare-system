name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -f infra/docker/Dockerfile -t $ECR_REGISTRY/healthcare-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/healthcare-api:$IMAGE_TAG

      - name: Update K8s deployment image tag
        env:
          IMAGE_TAG: ${{ steps.login-ecr.outputs.registry }}/healthcare-api:${{ github.sha }}
        run: |
          sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" infra/k8s/deployment.yaml

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name healthcare-cluster --region ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/service.yaml
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/healthcare-api --timeout=5m
