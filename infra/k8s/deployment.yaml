apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-api
  namespace: default
  labels:
    app: healthcare-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthcare-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: healthcare-api
    spec:
      containers:
        - name: healthcare-api
          image: IMAGE_TAG
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: healthcare-api-config
            - secretRef:
                name: healthcare-api-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
