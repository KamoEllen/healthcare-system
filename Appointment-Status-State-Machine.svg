<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="600" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="bold" fill="#1a1a1a">Appointment Status State Machine</text>
  <text x="450" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#666">Valid Transitions &amp; Role-Based Actions</text>
  
  <!-- States -->
  <!-- Pending -->
  <g transform="translate(380, 120)">
    <rect width="140" height="70" rx="35" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="70" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#e65100">PENDING</text>
    <text x="70" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Initial State</text>
  </g>
  
  <!-- Confirmed -->
  <g transform="translate(200, 280)">
    <rect width="140" height="70" rx="35" fill="#e8f5e9" stroke="#4caf50" stroke-width="3"/>
    <text x="70" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#2e7d32">CONFIRMED</text>
    <text x="70" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Doctor Action</text>
  </g>
  
  <!-- Completed -->
  <g transform="translate(200, 450)">
    <rect width="140" height="70" rx="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="70" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#0d47a1">COMPLETED</text>
    <text x="70" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Final State</text>
  </g>
  
  <!-- Cancelled -->
  <g transform="translate(560, 280)">
    <rect width="140" height="70" rx="35" fill="#ffebee" stroke="#d32f2f" stroke-width="3"/>
    <text x="70" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#b71c1c">CANCELLED</text>
    <text x="70" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Patient/Admin</text>
  </g>
  
  <!-- Arrows -->
  <!-- Book -> Pending -->
  <g transform="translate(280, 80)">
    <line x1="0" y1="0" x2="150" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrowst)"/>
    <text x="75" y="15" font-family="Segoe UI, Arial" font-size="12" fill="#666" font-weight="bold">BOOK</text>
    <text x="75" y="30" font-family="Segoe UI, Arial" font-size="10" fill="#999">Patient creates</text>
  </g>
  
  <!-- Pending -> Confirmed -->
  <path d="M 400 190 Q 300 230 270 280" stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrowst)"/>
  <text x="290" y="225" font-family="Segoe UI, Arial" font-size="11" fill="#2e7d32" font-weight="bold">CONFIRM</text>
  <text x="290" y="240" font-family="Segoe UI, Arial" font-size="10" fill="#666">Doctor only</text>
  
  <!-- Pending -> Cancelled -->
  <path d="M 500 190 Q 600 230 630 280" stroke="#d32f2f" stroke-width="3" fill="none" marker-end="url(#arrowst)"/>
  <text x="590" y="225" font-family="Segoe UI, Arial" font-size="11" fill="#d32f2f" font-weight="bold">CANCEL</text>
  <text x="590" y="240" font-family="Segoe UI, Arial" font-size="10" fill="#666">Patient/Admin</text>
  
  <!-- Confirmed -> Completed -->
  <line x1="270" y1="350" x2="270" y2="450" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowst)"/>
  <text x="290" y="405" font-family="Segoe UI, Arial" font-size="11" fill="#0d47a1" font-weight="bold">COMPLETE</text>
  <text x="290" y="420" font-family="Segoe UI, Arial" font-size="10" fill="#666">Doctor only</text>
  
  <!-- Confirmed -> Cancelled -->
  <path d="M 340 315 Q 450 315 560 315" stroke="#d32f2f" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowst)"/>
  <text x="450" y="305" font-family="Segoe UI, Arial" font-size="11" fill="#d32f2f">CANCEL (emergency)</text>
  <text x="450" y="340" font-family="Segoe UI, Arial" font-size="10" fill="#666">Admin only</text>
  
  <!-- Invalid Transitions (X marks) -->
  <g transform="translate(450, 485)">
    <circle cx="0" cy="0" r="15" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#d32f2f" stroke-width="2"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#d32f2f" stroke-width="2"/>
    <text x="25" y="5" font-family="Segoe UI, Arial" font-size="11" fill="#d32f2f">Invalid: Completed → Cancelled</text>
  </g>
  
  <g transform="translate(660, 350)">
    <circle cx="0" cy="0" r="15" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#d32f2f" stroke-width="2"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#d32f2f" stroke-width="2"/>
    <text x="25" y="5" font-family="Segoe UI, Arial" font-size="11" fill="#d32f2f">Invalid: Cancelled → Any</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 500)">
    <rect width="300" height="80" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="10" y="25" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#333">Rules:</text>
    <text x="10" y="45" font-family="Segoe UI, Arial" font-size="11" fill="#666">• Only PENDING can be cancelled by Patient</text>
    <text x="10" y="62" font-family="Segoe UI, Arial" font-size="11" fill="#666">• CONFIRMED requires ADMIN to cancel</text>
    <text x="10" y="79" font-family="Segoe UI, Arial" font-size="11" fill="#666">• COMPLETED is terminal (no changes)</text>
  </g>
  
  <!-- Database Constraint Note -->
  <g transform="translate(400, 550)">
    <rect width="450" height="40" rx="6" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
    <text x="10" y="25" font-family="Segoe UI, Arial" font-size="12" fill="#ff6f00" font-weight="bold">Database:</text>
    <text x="75" y="25" font-family="Segoe UI, Arial" font-size="11" fill="#333">CHECK constraint validates status values</text>
  </g>
  
  <defs>
    <marker id="arrowst" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
</svg>