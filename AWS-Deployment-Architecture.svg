<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="700" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="bold" fill="#1a1a1a">AWS Production Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#666">EKS + RDS Multi-AZ with Private Subnets</text>
  
  <!-- AWS Cloud Boundary -->
  <rect x="50" y="80" width="900" height="550" rx="10" fill="#f5f5f5" stroke="#ff9900" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="80" y="110" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#ff9900">AWS Cloud</text>
  
  <!-- VPC -->
  <rect x="100" y="130" width="800" height="480" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="130" y="160" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#2e7d32">VPC (10.0.0.0/16)</text>
  
  <!-- Internet Gateway -->
  <g transform="translate(120, 180)">
    <rect width="100" height="50" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="50" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#e65100">Internet</text>
    <text x="50" y="38" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">Gateway</text>
  </g>
  
  <!-- Public Subnet -->
  <rect x="140" y="250" width="300" height="140" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="160" y="275" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#0d47a1">Public Subnet (AZ-1)</text>
  
  <!-- ALB -->
  <g transform="translate(180, 290)">
    <rect width="100" height="70" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#1565c0">Application</text>
    <text x="50" y="42" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#1565c0">Load Balancer</text>
    <text x="50" y="58" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#666">Port 443</text>
  </g>
  
  <!-- NAT Gateway -->
  <g transform="translate(320, 290)">
    <rect width="80" height="70" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#1565c0">NAT</text>
    <text x="40" y="42" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#1565c0">Gateway</text>
    <text x="40" y="58" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#666">Egress only</text>
  </g>
  
  <!-- Private Subnet - EKS -->
  <rect x="140" y="420" width="400" height="160" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <text x="160" y="445" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#4a148c">Private Subnet - EKS Nodes (AZ-1, AZ-2)</text>
  
  <!-- EKS Cluster -->
  <g transform="translate(180, 470)">
    <rect width="320" height="90" rx="6" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
    <text x="160" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#7b1fa2">EKS Cluster (Kubernetes)</text>
    
    <!-- Pods -->
    <rect x="20" y="40" width="80" height="35" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="60" y="62" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#333">API Pod 1</text>
    
    <rect x="120" y="40" width="80" height="35" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="160" y="62" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#333">API Pod 2</text>
    
    <rect x="220" y="40" width="80" height="35" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="260" y="62" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#333">API Pod N</text>
  </g>
  
  <!-- Private Subnet - RDS -->
  <rect x="580" y="420" width="280" height="160" rx="6" fill="#ffebee" stroke="#d32f2f" stroke-width="2"/>
  <text x="600" y="445" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#b71c1c">Private Subnet - RDS (Isolated)</text>
  
  <!-- RDS -->
  <g transform="translate(620, 470)">
    <rect width="200" height="90" rx="6" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#b71c1c">RDS PostgreSQL</text>
    <text x="100" y="45" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">Multi-AZ Deployment</text>
    <text x="100" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">Encrypted at rest</text>
  </g>
  
  <!-- Client -->
  <g transform="translate(850, 180)">
    <rect width="80" height="50" rx="4" fill="#fff" stroke="#dd1b16" stroke-width="2"/>
    <text x="40" y="20" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#dd1b16">Client</text>
    <text x="40" y="38" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#666">Angular SPA</text>
  </g>
  
  <!-- Arrows -->
  <!-- Client to ALB -->
  <line x1="850" y1="205" x2="280" y2="205" stroke="#dd1b16" stroke-width="2" marker-end="url(#arrowaws)"/>
  <text x="565" y="195" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#dd1b16">HTTPS</text>
  
  <!-- ALB to Pods -->
  <line x1="230" y1="360" x2="230" y2="470" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowaws)"/>
  <line x1="360" y1="360" x2="360" y2="470" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowaws)"/>
  
  <!-- Pods to RDS -->
  <line x1="500" y1="515" x2="620" y2="515" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowaws)"/>
  <text x="560" y="505" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#d32f2f">PostgreSQL:5432</text>
  
  <!-- NAT to Internet -->
  <line x1="360" y1="290" x2="360" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrowaws)"/>
  
  <!-- Legend -->
  <g transform="translate(580, 250)">
    <rect width="280" height="140" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="10" y="25" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#333">Security Groups:</text>
    <text x="10" y="45" font-family="Segoe UI, Arial" font-size="11" fill="#666">• ALB: 0.0.0.0/0:443</text>
    <text x="10" y="62" font-family="Segoe UI, Arial" font-size="11" fill="#666">• EKS: ALB Security Group only</text>
    <text x="10" y="79" font-family="Segoe UI, Arial" font-size="11" fill="#666">• RDS: EKS Security Group only</text>
    <text x="10" y="100" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#d32f2f">No public access to DB</text>
    <text x="10" y="120" font-family="Segoe UI, Arial" font-size="10" fill="#666">Secrets: AWS Secrets Manager</text>
  </g>
  
  <!-- CI/CD Note -->
  <g transform="translate(100, 600)">
    <rect width="800" height="80" rx="6" fill="#e0f2f1" stroke="#009688" stroke-width="1"/>
    <text x="10" y="25" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#00695c">CI/CD Flow:</text>
    <text x="10" y="45" font-family="Segoe UI, Arial" font-size="11" fill="#333">GitHub Actions → ECR → kubectl apply → Rolling Update (maxUnavailable: 0)</text>
    <text x="10" y="65" font-family="Segoe UI, Arial" font-size="11" fill="#333">Terraform: VPC → EKS → RDS → ECR (Infrastructure as Code)</text>
  </g>
  
  <defs>
    <marker id="arrowaws" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>